<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>母親節驚喜翻轉燈</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .animate-spin-slow { animation: spin 3s linear infinite; }
  </style>
</head>
<body class="bg-pink-50 min-h-screen flex items-center justify-center font-sans text-gray-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const COUPONS = [
      { title: "自主學習券", desc: "遇到問題不依賴，我會先自己查資料、找答案，做個主動探究的學習者！", icon: "🔍", trait: "自主探究" },
      { title: "時間管理大師券", desc: "今天我自己規劃讀書與休息時間，按表操課，絕對不用媽媽催促！", icon: "⏳", trait: "自我管理" },
      { title: "高EQ冷靜券", desc: "遇到挫折或挑戰時，我保證深呼吸冷靜面對，用大腦思考，不用情緒發脾氣！", icon: "🧘‍♂️", trait: "情緒調節" },
      { title: "創客解題券", desc: "家裡有什麼不方便的地方？讓我發揮 Maker 精神，動腦動手幫媽媽想辦法解決！", icon: "💡", trait: "解決問題" },
      { title: "堅持到底券", desc: "今天挑戰一件困難的任務，我會發揮毅力堅持完成，絕對不半途而廢！", icon: "🧗‍♂️", trait: "任務承諾" },
      { title: "知識小老師券", desc: "跟你分享一個我最近學到最酷、最深入的新知識，讓我當媽媽的專屬講師！", icon: "🧠", trait: "知識分享" },
      { title: "同理心觀察券", desc: "今天我會仔細觀察媽媽的需要，主動提供「客製化」的貼心幫忙！", icon: "💖", trait: "同理心" },
      { title: "睡前深度反思券", desc: "睡前陪妳聊聊，分享今天我做得最棒的一件事，以及一件可以改進的事！", icon: "📝", trait: "後設認知" },
      { title: "天馬行空創意券", desc: "陪媽媽一起腦力激盪，用我最有創意、最跳脫框架的方法解決一個小煩惱！", icon: "🎨", trait: "創造力" },
      { title: "獨立負責券", desc: "今天的本分我自己完全負責，讓媽媽可以安心去追劇、放空，享受專屬 Me Time！", icon: "🚀", trait: "責任感" }
    ];

    const GAME_DURATION = 15;
    const TARGET_SCORE = 20;

    function App() {
      const [gameState, setGameState] = useState('start'); 
      const [playerName, setPlayerName] = useState('');
      const [lampPhoto, setLampPhoto] = useState(null); 
      const [score, setScore] = useState(0);
      const [timeLeft, setTimeLeft] = useState(GAME_DURATION);
      const [hearts, setHearts] = useState([]);
      const [wonCoupon, setWonCoupon] = useState(null);

      // Icon components replacements
      const HeartIcon = ({ className, size, fill, color }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size || 24} height={size || 24} viewBox="0 0 24 24" fill={fill || "none"} stroke={color || "currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
      );
      const SparklesIcon = ({ className, size }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size || 24} height={size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>
      );
      const ImageIcon = ({ className, size }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size || 24} height={size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
      );
      const CameraIcon = ({ className, size }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size || 24} height={size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
      );
      const PlayIcon = ({ className, size, fill }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size || 24} height={size || 24} viewBox="0 0 24 24" fill={fill || "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 3 19 12 5 21 5 3"/></svg>
      );
      const RotateCcwIcon = ({ className, size }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size || 24} height={size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
      );
      const GiftIcon = ({ className, size }) => (
         <svg xmlns="http://www.w3.org/2000/svg" width={size || 24} height={size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 12 20 22 4 22 4 12"/><rect width="20" height="5" x="2" y="7"/><line x1="12" x2="12" y1="22" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
      );

      const handlePhotoUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => {
            setLampPhoto(reader.result);
          };
          reader.readAsDataURL(file);
        }
      };

      useEffect(() => {
        let timer;
        let spawnInterval;

        if (gameState === 'playing') {
          timer = setInterval(() => {
            setTimeLeft((prev) => {
              if (prev <= 1) {
                clearInterval(timer);
                clearInterval(spawnInterval);
                setGameState('ready');
                return 0;
              }
              return prev - 1;
            });
          }, 1000);

          spawnInterval = setInterval(() => {
            setHearts((prevHearts) => {
              if (prevHearts.length > 5) return prevHearts;
              const newHeart = {
                id: Math.random().toString(36).substr(2, 9),
                x: Math.floor(Math.random() * 80) + 10,
                y: Math.floor(Math.random() * 70) + 10,
                size: Math.floor(Math.random() * 20) + 30,
              };
              return [...prevHearts, newHeart];
            });
          }, 600);
        }

        return () => {
          clearInterval(timer);
          clearInterval(spawnInterval);
        };
      }, [gameState, score]);

      const catchHeart = (id) => {
        setScore((prev) => prev + 1);
        setHearts((prevHearts) => prevHearts.filter((h) => h.id !== id));
        
        if (score + 1 >= TARGET_SCORE && gameState === 'playing') {
           setGameState('ready');
           setHearts([]);
        }
      };

      const startGame = () => {
        if (!playerName.trim()) {
          alert("請先輸入你的名字喔！");
          return;
        }
        setScore(0);
        setTimeLeft(GAME_DURATION);
        setHearts([]);
        setGameState('playing');
      };

      const openBox = () => {
        const randomCoupon = COUPONS[Math.floor(Math.random() * COUPONS.length)];
        setWonCoupon(randomCoupon);
        setGameState('opened');
      };

      const resetGame = () => {
        setGameState('start');
        setScore(0);
        setLampPhoto(null);
        setPlayerName('');
      };

      return (
        <div className="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden border-4 border-pink-200">
          
          <div className="bg-pink-400 p-4 text-center text-white relative overflow-hidden">
            <div className="absolute top-0 left-0 w-full h-full opacity-20 pointer-events-none flex justify-around">
              <HeartIcon className="animate-pulse mt-2" size={24} />
              <HeartIcon className="animate-pulse mt-6" size={16} />
              <HeartIcon className="animate-pulse mt-1" size={32} />
            </div>
            <h1 className="text-2xl font-bold tracking-wider relative z-10">母親節驚喜翻轉燈</h1>
            <p className="text-pink-100 text-sm mt-1 relative z-10">點亮實體作品與我的成長！</p>
          </div>

          <div className="p-6 min-h-[450px] flex flex-col justify-center relative">
            
            {gameState === 'start' && (
              <div className="text-center space-y-5 flex flex-col items-center">
                
                <div className="relative group">
                  {lampPhoto ? (
                    <div className="w-32 h-32 rounded-2xl overflow-hidden border-4 border-pink-300 shadow-md">
                      <img src={lampPhoto} alt="預覽" className="w-full h-full object-cover" />
                    </div>
                  ) : (
                    <div className="w-24 h-24 bg-pink-50 rounded-2xl flex items-center justify-center animate-bounce shadow-inner border border-pink-100">
                      <ImageIcon className="text-pink-400" size={40} />
                    </div>
                  )}
                  
                  <label className="mt-3 cursor-pointer bg-pink-50 hover:bg-pink-100 text-pink-600 font-semibold py-2 px-4 rounded-full text-sm inline-flex items-center gap-2 transition border border-pink-200">
                    <CameraIcon size={16} />
                    {lampPhoto ? '重新選擇照片' : '拍下你的翻轉燈'}
                    <input 
                      type="file" 
                      accept="image/*" 
                      onChange={handlePhotoUpload} 
                      className="hidden" 
                    />
                  </label>
                </div>

                <div className="w-full pt-2">
                  <input
                    type="text"
                    placeholder="輸入你的名字 (例如: 小明)"
                    className="w-full px-4 py-3 rounded-xl border-2 border-pink-200 focus:border-pink-500 focus:outline-none text-center text-lg shadow-sm mb-2 transition-colors"
                    value={playerName}
                    onChange={(e) => setPlayerName(e.target.value)}
                    maxLength={10}
                  />
                  <p className="text-xs text-gray-400">先上傳作品照片，再輸入名字開始挑戰！</p>
                </div>

                <button
                  onClick={startGame}
                  className="w-full bg-gradient-to-r from-pink-400 to-red-400 hover:from-pink-500 hover:to-red-500 text-white font-bold py-3 px-6 rounded-xl shadow-md transform transition hover:scale-105 flex items-center justify-center gap-2 mt-2"
                >
                  <PlayIcon fill="currentColor" size={20} />
                  開始收集愛心能量
                </button>
              </div>
            )}

            {gameState === 'playing' && (
              <div className="absolute inset-0 w-full h-full bg-pink-50/50">
                <div className="absolute top-4 left-4 right-4 flex justify-between items-center bg-white/90 p-3 rounded-xl shadow-sm z-10 backdrop-blur-sm">
                  <div className="flex items-center gap-2 text-pink-600 font-bold">
                    <HeartIcon fill="currentColor" size={20} color="#ec4899" className="animate-pulse" />
                    <span>能量: {score}/{TARGET_SCORE}</span>
                  </div>
                  <div className="text-gray-600 font-bold bg-gray-100 px-3 py-1 rounded-lg">
                    剩餘: {timeLeft} 秒
                  </div>
                </div>

                <div className="absolute top-16 left-4 right-4 h-2 bg-gray-200 rounded-full overflow-hidden z-10">
                  <div 
                    className="h-full bg-gradient-to-r from-pink-400 to-red-500 transition-all duration-300 ease-out"
                    style={{ width: `${Math.min((score / TARGET_SCORE) * 100, 100)}%` }}
                  ></div>
                </div>

                <div className="relative w-full h-full pt-20">
                  {hearts.map((heart) => (
                    <button
                      key={heart.id}
                      onClick={() => catchHeart(heart.id)}
                      className="absolute transform -translate-x-1/2 -translate-y-1/2 hover:scale-110 active:scale-90 transition-transform cursor-pointer drop-shadow-md"
                      style={{ left: `${heart.x}%`, top: `${heart.y}%` }}
                    >
                      <HeartIcon
                        fill="#ec4899"
                        color="#be185d"
                        size={heart.size}
                        className="animate-bounce"
                      />
                    </button>
                  ))}
                </div>
              </div>
            )}

            {gameState === 'ready' && (
              <div className="text-center space-y-6 flex flex-col items-center animate-in fade-in zoom-in duration-500">
                <div className="space-y-1">
                  <h2 className="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-red-500">
                    能量集滿了！
                  </h2>
                  <p className="text-gray-600 font-medium">你的作品亮起來了！</p>
                </div>

                <button 
                  onClick={openBox}
                  className="relative group cursor-pointer transform transition duration-500 hover:scale-105"
                >
                  <div className="absolute inset-0 bg-yellow-400 rounded-2xl blur-2xl opacity-60 group-hover:opacity-90 animate-pulse transition-opacity"></div>
                  <div className="absolute inset-0 bg-pink-400 rounded-2xl blur-xl opacity-40 animate-pulse delay-75"></div>
                  
                  <div className="relative w-40 h-40 bg-white border-4 border-yellow-200 rounded-2xl shadow-2xl flex items-center justify-center overflow-hidden z-10">
                    {lampPhoto ? (
                      <img src={lampPhoto} alt="我的翻轉燈" className="w-full h-full object-cover brightness-110" />
                    ) : (
                      <div className="w-24 h-24 bg-yellow-50 border-2 border-pink-200 rounded-lg flex items-center justify-center relative overflow-hidden">
                         <div className="absolute inset-0 bg-gradient-to-tr from-yellow-200 to-pink-200 animate-pulse opacity-70"></div>
                         <GiftIcon size={40} className="text-pink-500 relative z-10 animate-bounce" />
                      </div>
                    )}
                    <div className="absolute inset-0 bg-gradient-to-t from-yellow-500/20 to-transparent mix-blend-overlay"></div>
                  </div>
                  
                  <div className="mt-8 flex items-center justify-center gap-2 text-pink-600 font-bold bg-white/90 border-2 border-pink-200 px-5 py-3 rounded-full cursor-pointer hover:bg-pink-50 transition shadow-lg relative z-20">
                    <SparklesIcon size={18} className="text-yellow-500" />
                    點擊抽出成長兌換券
                    <SparklesIcon size={18} className="text-yellow-500" />
                  </div>
                </button>
              </div>
            )}

            {gameState === 'opened' && wonCoupon && (
              <div className="text-center flex flex-col items-center animate-in slide-in-from-bottom-4 duration-700 h-full justify-between">
                
                <div className="w-full bg-gradient-to-b from-pink-50 to-white p-6 rounded-2xl border-2 border-dashed border-pink-300 relative shadow-sm mb-4">
                  <SparklesIcon className="absolute top-2 right-2 text-yellow-400 animate-spin-slow" size={24} />
                  <SparklesIcon className="absolute bottom-2 left-2 text-yellow-400 animate-spin-slow" size={20} />
                  
                  {lampPhoto && (
                    <div className="absolute -top-6 left-1/2 transform -translate-x-1/2 w-16 h-16 rounded-full border-4 border-white shadow-md overflow-hidden bg-white z-10">
                      <img src={lampPhoto} alt="作品" className="w-full h-full object-cover" />
                    </div>
                  )}
                  
                  <div className={lampPhoto ? "mt-6" : ""}>
                    <h3 className="text-xl font-bold text-gray-800 mb-1">親愛的媽咪：</h3>
                    <p className="text-pink-600 font-bold text-lg mb-4">母親節快樂！送給妳我的成長！</p>
                  </div>
                  
                  <div className="bg-white rounded-xl p-4 shadow-inner border border-pink-100 my-4 transform -rotate-1 hover:rotate-0 transition-transform">
                    <div className="text-4xl mb-2">{wonCoupon.icon}</div>
                    <div className="inline-block bg-pink-100 text-pink-600 text-xs px-2 py-1 rounded-md mb-2 font-bold tracking-wide">
                      {wonCoupon.trait}
                    </div>
                    <div className="font-bold text-red-500 text-lg border-b border-pink-100 pb-2 mb-2">
                      {wonCoupon.title}
                    </div>
                    <p className="text-gray-600 text-sm leading-relaxed">
                      {wonCoupon.desc}
                    </p>
                  </div>

                  <div className="text-right mt-4 text-gray-500 italic">
                    — 越來越懂事的 <span className="font-bold text-pink-500">{playerName}</span> 敬上
                  </div>
                </div>

                <div className="w-full space-y-3">
                  <p className="text-xs text-gray-400 mb-2">請媽媽截圖保存這張專屬的成長宣言喔！</p>
                  <button
                    onClick={resetGame}
                    className="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3 px-6 rounded-xl flex items-center justify-center gap-2 transition"
                  >
                    <RotateCcwIcon size={18} />
                    重新抽一張
                  </button>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
